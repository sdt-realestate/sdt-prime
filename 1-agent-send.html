<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDT Prime</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--dark:#0F0F0F;--dark2:#1A1A1A;--dark3:#252525;--text:#E8E4DC;--muted:#9A9590;--border:rgba(201,168,76,0.2);--borders:rgba(201,168,76,0.55)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:"Heebo",sans-serif;font-weight:300;direction:rtl}
.wrap{max-width:640px;margin:0 auto;padding:36px 20px}
.hdr{text-align:center;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);position:relative}
.hdr::after{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60px;height:2px;background:var(--gold)}
.logo{font-family:"Frank Ruhl Libre",serif;font-size:28px;letter-spacing:4px;color:var(--gold)}
.logo-s{font-size:11px;letter-spacing:5px;color:var(--muted);margin-bottom:12px}
.page-title{font-size:17px;font-weight:400}
.page-sub{font-size:12px;color:var(--muted);margin-top:3px}
.panel{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
.ptitle{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:18px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.full{grid-column:1/-1}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.f input,.f select,.f textarea{background:var(--dark3);border:1px solid var(--border);border-radius:4px;padding:9px 12px;color:var(--text);font-family:"Heebo",sans-serif;font-size:13px;outline:none;transition:border .2s;direction:rtl;-webkit-appearance:none}
.f input:focus,.f select:focus{border-color:var(--gold)}
.f textarea{min-height:65px;resize:vertical}
.f select option{background:var(--dark2)}
.cbar{background:var(--dark3);border:1px solid var(--borders);border-radius:5px;padding:10px 14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.cbar span{font-size:12px;color:var(--muted)}
.cbar strong{font-size:14px;color:var(--gold)}
.prev{background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:14px 16px;font-size:12px;color:var(--muted);line-height:2;margin-top:12px}
.prev strong{color:var(--text)}
.ph{color:#555 !important;font-style:italic}
.wabtn{display:block;width:100%;background:#25D366;border:none;color:#fff;padding:15px;border-radius:6px;font-family:"Heebo",sans-serif;font-size:15px;font-weight:600;text-align:center;text-decoration:none;margin-top:12px;cursor:pointer}
.wabtn:active{background:#1DA851}
@media(max-width:500px){.fg,.fg3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="logo">SDT PRIME</div>
    <div class="logo-s">נדל"ן · תיווך מקצועי</div>
    <div class="page-title">שליחת הסכם תיווך ללקוח</div>
    <div class="page-sub">מלא פרטים → שלח בוואטסאפ → הלקוח חותם</div>
  </div>

  <div class="panel">
    <div class="ptitle">פרטי הנכס</div>
    <div class="fg">
      <div class="f full"><label>כתובת הנכס *</label><input id="addr" type="text" placeholder="רחוב, מספר, עיר" oninput="update()"></div>
      <div class="f"><label>סוג עסקה *</label>
        <select id="deal" onchange="update()">
          <option value="">בחר</option>
          <option>מכירה</option><option>השכרה</option><option>קנייה</option><option>שכירות</option>
        </select>
      </div>
      <div class="f"><label>סוג נכס</label>
        <select id="ptype">
          <option value="">בחר</option>
          <option>דירה</option><option>בית פרטי</option><option>פנטהאוז</option><option>נכס מסחרי</option><option>קרקע</option>
        </select>
      </div>
      <div class="f"><label>מחיר</label><input id="price" type="text" placeholder="1,500,000"></div>
      <div class="f"><label>חדרים</label><input id="rooms" type="text" placeholder="3.5"></div>
      <div class="f"><label>קומה</label><input id="floor" type="text" placeholder="4 מתוך 8"></div>
      <div class="f"><label>מ"ר</label><input id="sqm" type="text" placeholder="85"></div>
      <div class="f full"><label>הערות</label><textarea id="notes" placeholder="פרטים נוספים..."></textarea></div>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">דמי תיווך</div>
    <div class="fg3">
      <div class="f"><label>שיעור</label>
        <select id="comm" onchange="update()">
          <option>2% + מע"מ</option><option>1.5% + מע"מ</option><option>1% + מע"מ</option>
        </select>
      </div>
      <div class="f"><label>גביה מ</label>
        <select id="commFrom" onchange="update()">
          <option>המוכר / המשכיר</option><option>הקונה / השוכר</option><option>שני הצדדים</option>
        </select>
      </div>
      <div class="f"><label>מועד תשלום</label>
        <input type="text" value="לאחר חתימת הסכם מכירה" readonly style="color:var(--gold)">
      </div>
    </div>
    <div class="cbar">
      <span>דמי תיווך:</span>
      <strong id="cdsp">2% + מע"מ מהמוכר / המשכיר</strong>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">שליחה ללקוח</div>
    <div class="fg">
      <div class="f"><label>שם הלקוח *</label><input id="cname" type="text" placeholder="שם מלא" oninput="update()"></div>
      <div class="f"><label>טלפון לקוח</label><input id="cphone" type="tel" placeholder="05X-XXXXXXX"></div>
    </div>
    <div class="prev">
      שלום <strong id="prname" class="ph">שם הלקוח</strong><br>
      דורון טואיטו מ-SDT Prime.<br>
      הסכם תיווך: <strong id="praddr" class="ph">כתובת הנכס</strong>
    </div>
    <a id="wabtn" class="wabtn" href="https://wa.me/" onclick="return prepWA(this)" style="margin-bottom:8px">&#128241; שלח בוואטסאפ</a>
    <div id="linkDiv" style="display:none;background:var(--dark3);border:1px solid var(--borders);border-radius:6px;padding:12px;margin-top:8px;word-break:break-all;font-size:11px;color:var(--muted)">
      <div style="font-size:10px;color:var(--gold);margin-bottom:6px;letter-spacing:1px">אם לא נפתח — העתק את ההודעה:</div>
      <div id="msgPreview" style="color:var(--text);line-height:1.7;white-space:pre-wrap"></div>
      <button onclick="copyMsg()" style="margin-top:10px;background:var(--gold);border:none;color:var(--dark);padding:8px 16px;border-radius:4px;font-family:Heebo,sans-serif;font-size:12px;font-weight:600;cursor:pointer;width:100%">העתק הודעה</button>
    </div>
  </div>
</div>

<script>
var BASE = "https://sdt-realestate.github.io/sdt-prime/2-client-sign.html";
function g(id){return document.getElementById(id).value.trim();}
function update(){
  var name=g("cname")||"שם הלקוח";
  var addr=g("addr")||"כתובת הנכס";
  document.getElementById("prname").textContent=name;
  document.getElementById("praddr").textContent=addr;
  document.getElementById("prname").className=(name==="שם הלקוח")?"ph":"";
  document.getElementById("praddr").className=(addr==="כתובת הנכס")?"ph":"";
  document.getElementById("cdsp").textContent=g("comm")+" מ"+g("commFrom");
}
function prepWA(el){
  var name=g("cname");
  var addr=g("addr");
  if(!name){alert("נא למלא שם לקוח");return false;}
  if(!addr){alert("נא למלא כתובת נכס");return false;}
  var p=new URLSearchParams();
  p.set("cn",name);
  if(g("addr"))p.set("a",g("addr"));
  if(g("deal"))p.set("d",g("deal"));
  if(g("ptype"))p.set("t",g("ptype"));
  if(g("price"))p.set("p",g("price"));
  if(g("rooms"))p.set("r",g("rooms"));
  if(g("floor"))p.set("f",g("floor"));
  if(g("sqm"))p.set("s",g("sqm"));
  if(g("notes"))p.set("n",g("notes"));
  if(g("comm"))p.set("c",g("comm"));
  if(g("commFrom"))p.set("cf",g("commFrom"));
  var link=BASE+"?"+p.toString();
  var msg="שלום "+name+"\n\nדורון טואיטו מ-SDT Prime.\n\nהסכם תיווך לחתימה:\n"
    +addr+"\n"
    +"עסקה: "+(g("deal")||"תיווך")+"\n"
    +"דמי תיווך: "+g("comm")+" מ"+g("commFrom")+"\n\n"
    +"למילוי פרטים וחתימה:\n"+link+"\n\nלשאלות: 050-244-8682";
  var phone=g("cphone").replace(/[^0-9]/g,"");
  var pfmt=phone.startsWith("0")?"972"+phone.slice(1):phone;
  var waUrl=pfmt
    ?"https://wa.me/"+pfmt+"?text="+encodeURIComponent(msg)
    :"https://wa.me/?text="+encodeURIComponent(msg);
  el.href=waUrl;
  // שמור הודעה להצגה
  window._lastMsg = msg;
  window._lastWaUrl = waUrl;
  // הצג div עם ההודעה למקרה שלא נפתח
  setTimeout(function(){
    document.getElementById('linkDiv').style.display='block';
    document.getElementById('msgPreview').textContent=msg;
  }, 1500);
  return true;
}
function copyMsg(){
  if(window._lastMsg){
    navigator.clipboard.writeText(window._lastMsg).then(function(){
      alert('הועתק! עבור לוואטסאפ, בחר את הלקוח והדבק.');
    }).catch(function(){
      prompt('העתק את ההודעה:', window._lastMsg);
    });
  }
}
</script>
</body>
</html>
